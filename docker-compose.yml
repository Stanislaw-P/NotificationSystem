version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # Порт для подключения приложений (AMQP)
      - "15672:15672"  # Порт для панели управления (Management UI)
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  smtp4dev:
    image: rnwood/smtp4dev:latest
    ports:
      - "5000:80"    # веб-интерфейс
      - "25:25"      # SMTP порт

  orderservice.api:
    build:
      context: .                   
      dockerfile: OrderService.Api/Dockerfile
    container_name: orderservice-api
    restart: on-failure
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__HostName: rabbitmq          # имя сервиса в docker-сети
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy          # ждём пока RabbitMQ реально готов

  notificationservice.worker:
    build:
      context: .
      dockerfile: NotificationService.Worker/Dockerfile
    container_name: notificationservice-worker
    restart: on-failure
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      Smtp__Host: smtp4dev                 
      Smtp__Port: 25
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rabbitmq_data:
