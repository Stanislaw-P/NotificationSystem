version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: postgres-notifications-system
    restart: always
    environment:
      POSTGRES_DB: notifications
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d notifications"]
      interval: 10s
      timeout: 5s
      retries: 5

  smtp4dev:
    image: rnwood/smtp4dev:latest
    ports:
      - "5000:80"
      - "25:25"

  orderservice.api:
    build:
      context: .
      dockerfile: OrderService.Api/Dockerfile
    container_name: orderservice-api
    restart: on-failure
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy

  notificationservice.worker:
    build:
      context: .
      dockerfile: NotificationService.Worker/Dockerfile
    container_name: notificationservice-worker
    restart: on-failure
    environment:
      DOTNET_ENVIRONMENT: Development
      RabbitMq__HostName: rabbitmq
      RabbitMq__UserName: guest
      RabbitMq__Password: guest
      Smtp__Host: smtp4dev
      Smtp__Port: 25
      # Двойное подчёркивание = вложенная секция ConnectionStrings:DefaultConnection
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=notifications;Username=postgres;Password=postgres"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

volumes:
  rabbitmq_data:
  postgres_data: